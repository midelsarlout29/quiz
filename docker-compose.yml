services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-quiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_quiz
      POSTGRES_USER: smart_quiz
      POSTGRES_PASSWORD: smart_quiz
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
